<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ضجة سيستم</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', 'Tahoma', sans-serif;
        }

        body {
            background: #f0f2f5;
            padding: 15px;
        }

        .app {
            max-width: 600px;
            margin: 0 auto;
        }

        /* الهيدر */
        .header {
            background: linear-gradient(135deg, #1e3a5f, #0f2b3d);
            border-radius: 30px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
        }

        .logo {
            width: 60px;
            height: 60px;
            background: #ffc107;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
            font-size: 1.8rem;
        }

        .header h1 {
            color: white;
            font-size: 1.5rem;
        }

        .header p {
            color: rgba(255,255,255,0.8);
            font-size: 0.7rem;
        }

        /* القائمة الرئيسية */
        .main-menu {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .menu-card {
            flex: 1;
            background: white;
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid #e0e0e0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .menu-card:hover {
            background: #fff3cd;
            border-color: #ffc107;
            transform: translateY(-2px);
        }

        .menu-icon {
            font-size: 1.8rem;
            margin-bottom: 8px;
        }

        .menu-card h3 {
            color: #1e3a5f;
            font-size: 0.9rem;
        }

        .menu-card p {
            color: #6c757d;
            font-size: 0.65rem;
            margin-top: 4px;
        }

        /* البطاقات */
        .card {
            background: white;
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 18px;
            border: 1px solid #e0e0e0;
        }

        .card-title {
            color: #1e3a5f;
            font-size: 1rem;
            margin-bottom: 15px;
            font-weight: bold;
            border-right: 3px solid #ffc107;
            padding-right: 10px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            color: #495057;
            font-size: 0.75rem;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .input-group input, .input-group select {
            width: 100%;
            padding: 10px;
            background: #fff9e6;
            border: 1px solid #ffc107;
            border-radius: 12px;
            color: #1e3a5f;
            font-size: 0.9rem;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #1e3a5f, #0f2b3d);
            border: none;
            border-radius: 25px;
            color: white;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #1e3a5f;
            color: #1e3a5f;
        }

        .result-box {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 12px;
            margin-top: 15px;
            max-height: 250px;
            overflow-y: auto;
            border: 1px solid #e0e0e0;
        }

        .result-item {
            background: #fff9e6;
            padding: 8px;
            margin: 6px 0;
            border-radius: 10px;
            font-size: 0.75rem;
            border-right: 3px solid #ffc107;
        }

        .footer {
            text-align: center;
            padding: 15px;
            background: white;
            border-radius: 20px;
            margin-top: 10px;
            color: #6c757d;
            font-size: 0.6rem;
            border: 1px solid #e0e0e0;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background: #28a745;
            color: white;
            text-align: center;
            padding: 10px;
            border-radius: 25px;
            z-index: 1000;
        }
    </style>
</head>
<body>
<div class="app">

    <div class="header">
        <div class="logo">🎯</div>
        <h1>ضجة سيستم</h1>
        <p>تخصيص المونتال والفيبر والأمونيا والدرف</p>
    </div>

    <!-- الشاشة الرئيسية -->
    <div id="mainScreen">
        <div class="main-menu">
            <div class="menu-card" onclick="showPage('deduction')">
                <div class="menu-icon">📦</div>
                <h3>تخصيص الوحدات</h3>
                <p>مونتال · فيبر · أمونيا</p>
            </div>
            <div class="menu-card" onclick="showPage('handles')">
                <div class="menu-icon">🔧</div>
                <h3>تخصيم الدرف</h3>
                <p>درف · بلتي إن · كلادينج</p>
            </div>
            <div class="menu-card" onclick="showPage('inventory')">
                <div class="menu-icon">📊</div>
                <h3>حساب الخامات</h3>
                <p>جرد وتسعير</p>
            </div>
        </div>
        <div class="footer">برمجة المهندس ياسين علاء © 2025</div>
    </div>

    <!-- صفحة تخصيص الوحدات -->
    <div id="deductionPage" style="display:none;">
        <div class="card">
            <div class="card-title">📏 إضافة وحدة جديدة</div>
            <div class="input-group"><label>اسم الوحدة</label><input type="text" id="unitName" placeholder="مثال: مطبخ سفلي"></div>
            <div class="input-group"><label>نوع الوحدة</label>
                <select id="unitType"><option>سفلي</option><option>علوي</option><option>دولاب خزين</option></select>
            </div>
            <div class="input-group"><label>العرض (سم)</label><input type="number" id="width" value="0"></div>
            <div class="input-group"><label>الارتفاع (سم)</label><input type="number" id="height" value="0"></div>
            <div class="input-group"><label>العمق (سم)</label><input type="number" id="depth" value="0"></div>
            <div class="input-group"><label>عرض الرف (سم)</label><input type="number" id="shelfW" value="0"></div>
            <div class="input-group"><label>عمق الرف (سم)</label><input type="number" id="shelfD" value="0"></div>
            <div class="input-group"><label>عدد الأرفف</label><input type="number" id="shelfQ" value="0"></div>
            <button onclick="addUnit()">✅ حفظ الوحدة</button>
            <button class="btn-outline" onclick="goBack()" style="margin-top:5px;">🏠 رجوع</button>
        </div>
        <div id="unitResult"></div>
    </div>

    <!-- صفحة تخصيم الدرف -->
    <div id="handlesPage" style="display:none;">
        <div class="card">
            <div class="card-title">🔧 تخصيم الدرف</div>
            <div class="input-group"><label>ارتفاع الدرفة (سم)</label><input type="number" id="handleH" value="0"></div>
            <div class="input-group"><label>عرض الدرفة (سم)</label><input type="number" id="handleW" value="0"></div>
            <div class="input-group"><label>عدد الدرف</label><input type="number" id="handleCount" value="1"></div>
            <div class="input-group"><label>اسم المشروع</label><input type="text" id="handleName" placeholder="مثال: درفة مطبخ"></div>
            <button onclick="addHandles()">✅ حفظ الدرف</button>
            <button class="btn-outline" onclick="goBack()" style="margin-top:5px;">🏠 رجوع</button>
        </div>
        <div id="handlesResult"></div>
    </div>

    <!-- صفحة حساب الخامات -->
    <div id="inventoryPage" style="display:none;">
        <div class="card">
            <div class="card-title">📊 الخامات المطلوبة</div>
            <div id="inventoryStats"></div>
            <button class="btn-outline" onclick="goBack()">🏠 رجوع</button>
            <button onclick="clearData()" style="background:#dc3545; margin-top:5px;">🗑️ مسح الكل</button>
        </div>
    </div>

</div>

<script>
    // ========== البيانات ==========
    let projectData = [];

    function loadData() {
        let saved = localStorage.getItem("dogaData");
        if(saved) projectData = JSON.parse(saved);
        updateInventory();
    }

    function saveData() {
        localStorage.setItem("dogaData", JSON.stringify(projectData));
        updateInventory();
    }

    function showToast(msg) {
        let t = document.createElement("div");
        t.className = "toast";
        t.innerText = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2000);
    }

    // ========== إضافة وحدة ==========
    function addUnit() {
        let name = document.getElementById("unitName").value || "وحدة جديدة";
        let type = document.getElementById("unitType").value;
        let W = parseFloat(document.getElementById("width").value) || 0;
        let H = parseFloat(document.getElementById("height").value) || 0;
        let D = parseFloat(document.getElementById("depth").value) || 0;
        let shelfW = parseFloat(document.getElementById("shelfW").value) || 0;
        let shelfD = parseFloat(document.getElementById("shelfD").value) || 0;
        let shelfQ = parseInt(document.getElementById("shelfQ").value) || 0;

        if(W <= 0 || H <= 0) { showToast("أدخل العرض والارتفاع"); return; }

        let hDed = (type === "سفلي" || type === "دولاب خزين") ? 13 : 5;
        let fH = H - hDed;
        let fW = W - 5;
        let fD = D - 5;

        // مونتال الهيكل
        if(type === "سفلي") {
            projectData.push({ unit: name, material: "مونتال", item: "قائم ارتفاع", size: fH, qty: 2, type: "مفرد" });
            projectData.push({ unit: name, material: "مونتال", item: "قائم ارتفاع", size: fH, qty: 2, type: "متقارب" });
            projectData.push({ unit: name, material: "مونتال", item: "عارضة عرض", size: fW, qty: 3, type: "مفرد" });
            projectData.push({ unit: name, material: "مونتال", item: "عارضة عرض", size: fW, qty: 1, type: "متقارب" });
            projectData.push({ unit: name, material: "مونتال", item: "رباط عمق", size: fD, qty: 2, type: "مفرد" });
            projectData.push({ unit: name, material: "مونتال", item: "رباط عمق", size: fD, qty: 2, type: "متقارب" });
        } else {
            projectData.push({ unit: name, material: "مونتال", item: "قائم ارتفاع", size: fH, qty: 2, type: "مفرد" });
            projectData.push({ unit: name, material: "مونتال", item: "قائم ارتفاع", size: fH, qty: 2, type: "متقارب" });
            projectData.push({ unit: name, material: "مونتال", item: "عارضة عرض", size: fW, qty: 2, type: "مفرد" });
            projectData.push({ unit: name, material: "مونتال", item: "عارضة عرض", size: fW, qty: 2, type: "متقارب" });
            projectData.push({ unit: name, material: "مونتال", item: "رباط عمق", size: fD, qty: 4, type: "متقارب" });
        }

        // فيبر الهيكل
        projectData.push({ unit: name, material: "فيبر", item: "ضهرية", size: `${fW}×${fH}`, qty: 1, type: "لوح" });
        projectData.push({ unit: name, material: "فيبر", item: "أرضية", size: `${fW}×${fD}`, qty: 1, type: "لوح" });
        if(type !== "سفلي") projectData.push({ unit: name, material: "فيبر", item: "سقفية", size: `${fW}×${fD}`, qty: 1, type: "لوح" });
        projectData.push({ unit: name, material: "فيبر", item: "أجناب", size: `${fH}×${fD}`, qty: 2, type: "لوح" });

        // الأرفف
        if(shelfQ > 0 && shelfW > 0 && shelfD > 0) {
            projectData.push({ unit: name, material: "مونتال", item: "عرض رف", size: shelfW, qty: shelfQ*2, type: "مفرد" });
            projectData.push({ unit: name, material: "مونتال", item: "عمق رف", size: shelfD, qty: shelfQ*2, type: "مفرد" });
            projectData.push({ unit: name, material: "فيبر", item: "حشو رف (فيبر)", size: `${shelfW-5}×${shelfD-5}`, qty: shelfQ, type: "لوح" });
            projectData.push({ unit: name, material: "أمونيا", item: "حشو رف (أمونيا)", size: `${shelfW-5}×${shelfD-5}`, qty: shelfQ, type: "عود" });
        }

        saveData();
        showToast(`✅ تم حفظ ${name}`);
        
        document.getElementById("width").value = "0";
        document.getElementById("height").value = "0";
        document.getElementById("shelfW").value = "0";
        document.getElementById("shelfD").value = "0";
        document.getElementById("shelfQ").value = "0";
    }

    // ========== إضافة درف ==========
    function addHandles() {
        let height = parseFloat(document.getElementById("handleH").value) || 0;
        let width = parseFloat(document.getElementById("handleW").value) || 0;
        let count = parseInt(document.getElementById("handleCount").value) || 1;
        let name = document.getElementById("handleName").value.trim() || "درفة جديدة";

        if(height <= 0 || width <= 0) { showToast("أدخل الارتفاع والعرض"); return; }

        for(let i=0; i<count; i++) {
            projectData.push({ unit: name, material: "أمونيا", item: "جنب أمونيا", size: height, qty: 2, type: "عود" });
            projectData.push({ unit: name, material: "بلتي إن", item: "مقبض بلتي إن", size: width, qty: 1, type: "عود" });
            projectData.push({ unit: name, material: "درف", item: "درفة عدية", size: width, qty: 1, type: "عود" });
            projectData.push({ unit: name, material: "كلادينج", item: "لوح كلادينج", size: `${height}×${width}`, qty: 1, type: "لوح" });
        }

        saveData();
        showToast(`✅ تم حفظ ${count*4} قطعة`);
        
        document.getElementById("handleH").value = "0";
        document.getElementById("handleW").value = "0";
        document.getElementById("handleCount").value = "1";
    }

    // ========== حساب الإحصائيات ==========
    function getStats() {
        let stats = {
            مفرد: 0, متقارب: 0, علبه_درج: 0, أمونيا: 0, درف: 0, بلتي: 0,
            فيبر: 0, كلادينج: 0
        };
        let sheetSize = 280 * 130;
        
        projectData.forEach(i => {
            if(i.material === "مونتال") {
                if(i.type === "مفرد") stats.مفرد += i.size * i.qty;
                if(i.type === "متقارب") stats.متقارب += i.size * i.qty;
                if(i.type === "علبه درج") stats.علبه_درج += i.size * i.qty;
            }
            if(i.material === "أمونيا") stats.أمونيا += i.size * i.qty;
            if(i.material === "درف") stats.درف += i.size * i.qty;
            if(i.material === "بلتي إن") stats.بلتي += i.size * i.qty;
            if(i.material === "فيبر" && i.size.includes("×")) {
                let parts = i.size.split("×");
                let w = parseFloat(parts[0]), h = parseFloat(parts[1]);
                if(!isNaN(w)&&!isNaN(h)) stats.فيبر += w * h * i.qty;
            }
            if(i.material === "كلادينج" && i.size.includes("×")) {
                let parts = i.size.split("×");
                let w = parseFloat(parts[0]), h = parseFloat(parts[1]);
                if(!isNaN(w)&&!isNaN(h)) stats.كلادينج += w * h * i.qty;
            }
        });
        return stats;
    }

    function updateInventory() {
        let stats = getStats();
        let sheetSize = 280 * 130;
        let html = `
            <div style="background:#f8f9fa; padding:10px; border-radius:15px; margin-bottom:10px;">
                <strong>🥢 أعواد المونتال (6م):</strong><br>
                مفرد: ${Math.ceil(stats.مفرد/600)} عود &nbsp;|&nbsp;
                متقارب: ${Math.ceil(stats.متقارب/600)} عود
            </div>
            <div style="background:#f8f9fa; padding:10px; border-radius:15px; margin-bottom:10px;">
                <strong>🟡 أعواد الأمونيا (6م):</strong><br>
                أمونيا: ${Math.ceil(stats.أمونيا/600)} عود
            </div>
            <div style="background:#f8f9fa; padding:10px; border-radius:15px; margin-bottom:10px;">
                <strong>🔧 خامات إضافية:</strong><br>
                درف: ${Math.ceil(stats.درف/600)} عود &nbsp;|&nbsp;
                بلتي إن: ${Math.ceil(stats.بلتي/600)} عود
            </div>
            <div style="background:#f8f9fa; padding:10px; border-radius:15px; margin-bottom:10px;">
                <strong>🪵 ألواح خشب (280×130):</strong><br>
                فيبر: ${Math.ceil(stats.فيبر/sheetSize)} لوح &nbsp;|&nbsp;
                كلادينج: ${Math.ceil(stats.كلادينج/sheetSize)} لوح
            </div>
            <hr>
            <div style="max-height:250px; overflow-y:auto;">
                ${projectData.length === 0 ? "<p style='text-align:center;'>لا توجد بيانات</p>" : ""}
                ${projectData.slice().reverse().map(i => `<div style="background:#fff9e6; padding:6px; margin:4px 0; border-radius:8px; font-size:12px;">📌 ${i.unit} | ${i.material} | ${i.item} | ${i.size} سم | ×${i.qty}</div>`).join('')}
            </div>
        `;
        document.getElementById("inventoryStats").innerHTML = html;
    }

    function clearData() {
        if(confirm("مسح كل البيانات؟")) {
            projectData = [];
            saveData();
            showToast("🗑️ تم مسح الكل");
        }
    }

    // ========== التنقل ==========
    function showPage(page) {
        document.getElementById("mainScreen").style.display = "none";
        document.getElementById("deductionPage").style.display = page === 'deduction' ? "block" : "none";
        document.getElementById("handlesPage").style.display = page === 'handles' ? "block" : "none";
        document.getElementById("inventoryPage").style.display = page === 'inventory' ? "block" : "none";
        if(page === 'inventory') updateInventory();
    }

    function goBack() {
        document.getElementById("mainScreen").style.display = "block";
        document.getElementById("deductionPage").style.display = "none";
        document.getElementById("handlesPage").style.display = "none";
        document.getElementById("inventoryPage").style.display = "none";
    }

    loadData();
    showPage('main');
</script>
</body>
</html>
